# @file release.yaml
# @brief Release workflow — creates a GitHub release from a version tag.
#
# Triggered when a tag matching "v*" is pushed.  Verifies that the CI Build
# workflow succeeded for the same commit, downloads its artifacts, packages
# them into a .zip, detects alpha/beta pre-releases, and publishes a GitHub
# release with the Windows .zip and macOS .dmg attached.

name: Create Release

on:
  push:
    tags:
      - "v*" # triggers when a tag like v0.6.1 or v0.6.1.alpha.9 is pushed

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    name: Create Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch upstream main
        run: |
          git remote add upstream https://github.com/netniV/stfc-mod.git
          git fetch --no-tags --depth=1 upstream main

      # ✅ Step 1 — Check if Build succeeded for this same commit
      - name: Check latest Build success
        id: check_build
        run: |
          echo "Checking for successful Build workflow for commit ${{ github.sha }}..."
          response=$(gh api \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/actions/runs \
            --jq '.workflow_runs[] | select(.name=="Build" and .head_sha=="${{ github.sha }}" and .conclusion=="success") | .id' | head -n 1)
          
          if [ -z "$response" ]; then
            echo "❌ No successful Build workflow found for this commit."
            exit 1
          fi

          echo "✅ Found successful Build run ID: $response"
          echo "build_run_id=$response" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ✅ Step 2 — Download the Build artifacts
      - name: Download artifact from Build workflow
        uses: dawidd6/action-download-artifact@v20
        with:
          run_id: ${{ steps.check_build.outputs.build_run_id }}

      # ✅ Step 3 — Package up
      - name: Package
        run: |
          (cd stfc-community-mod && zip -r - .) > stfc-community-mod.zip

      - name: Prepare release assets
        run: |
          cp stfc-community-mod/version.dll version.dll
          sha256sum version.dll \
            stfc-community-mod.zip \
            stfc-community-mod-installer/stfc-community-mod-installer.dmg > SHA256SUMS.txt

      # ✅ Step 4 — Detect prerelease (alpha/beta)
      - name: Check Prerelease
        id: check-prerelease
        run: |
          if echo "${{ github.ref_name }}" | grep -Pq "^v[\d]+\.[\d]+\.[\d]+(?:(?:\.(alpha|beta)\.[\d]+)|(?:-guffa\.[\d]+))?$"; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release body
        run: |
          compare_url="https://github.com/netniV/stfc-mod/compare/main...Guffawaffle:${{ github.ref_name }}"
          readme_url="https://github.com/Guffawaffle/stfc-mod/blob/${{ github.ref_name }}/README.md#whats-different-in-this-fork"

          cat > release-body.md <<'EOF'
          > **⚠️ UNOFFICIAL FORK — This is NOT the official STFC Community Mod.**
          >
          > This build comes from [Guffawaffle's personal fork](https://github.com/Guffawaffle/stfc-mod) and contains experimental features not yet accepted upstream.
          > **For the official mod, go to [netniV/stfc-mod](https://github.com/netniV/stfc-mod/releases/latest).**
          > **To support the project, [sponsor netniV](https://github.com/sponsors/netniV)** — he built this.

          ---

          ### Release Assets
          - `stfc-community-mod.zip` — recommended Windows download
          - `version.dll` — direct drop-in update for existing installs
          - `SHA256SUMS.txt` — optional hash verification for release assets

          ### What's different in this fork?
          See the [fork README](__README_URL__) for a list of experimental features.

          ### Full Fork Delta From Upstream Main
          This section compares this release against `netniV/stfc-mod` `main`, not just the previous fork tag.

          Full compare: __COMPARE_URL__

          EOF

          sed -i "s|__COMPARE_URL__|${compare_url}|" release-body.md
          sed -i "s|__README_URL__|${readme_url}|" release-body.md
          git log --reverse --no-merges --format='- %s' upstream/main..${{ github.sha }} | awk '!seen[$0]++' >> release-body.md

      # ✅ Step 5 — Create Release
      - name: Create Release
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref }}
          name: "${{ github.ref_name }} (Guffawaffle Fork)"
          prerelease: ${{ steps.check-prerelease.outputs.prerelease == 'true' }}
          bodyFile: release-body.md

      - name: Normalize release notes and target metadata
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --target "${{ github.sha }}" --notes-file release-body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ✅ Step 6 — Upload assets
      - name: Upload Community Mod - Direct DLL
        uses: shogo82148/actions-upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./version.dll
          asset_name: version.dll
          asset_content_type: application/octet-stream

      - name: Upload Community Mod - Standard
        uses: shogo82148/actions-upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./stfc-community-mod.zip
          asset_name: stfc-community-mod.zip
          asset_content_type: application/zip

      - name: Upload Community Mod - Versioned
        uses: shogo82148/actions-upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./stfc-community-mod.zip
          asset_name: stfc-community-mod-${{ github.ref_name }}.zip
          asset_content_type: application/zip

      - name: Upload Community Mod - Mac Installer
        uses: shogo82148/actions-upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./stfc-community-mod-installer/stfc-community-mod-installer.dmg
          asset_name: stfc-community-mod-installer.dmg
          asset_content_type: application/x-apple-diskimage

      - name: Upload Community Mod - Checksums
        uses: shogo82148/actions-upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./SHA256SUMS.txt
          asset_name: SHA256SUMS.txt
          asset_content_type: text/plain
